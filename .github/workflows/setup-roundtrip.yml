name: setup-roundtrip

on:
  pull_request: {}
  push:
    branches: [main]

jobs:
  setup-roundtrip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: setup-roundtrip
        run: bash scripts/ci/setup-roundtrip.sh
